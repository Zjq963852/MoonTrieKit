name: MoonTrieKit CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  moonbit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Format check
        run: moon fmt --check

      - name: Run tests
        run: moon test

      - name: Run CLI demo
        run: moon run cmd/main
